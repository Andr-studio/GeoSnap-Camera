name: geosnap_cam
description: "A new Flutter project."
publish_to: 'none'
version: 0.2.0

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  camerawesome: ^2.5.0
  geolocator: ^13.0.0
  sensors_plus: ^6.0.0

  geocoding: ^3.0.0
  google_maps_flutter: ^2.17.0
  http: ^1.6.0

  image_editor: ^1.6.0
  native_exif: ^0.7.0
  ffmpeg_kit_min_gpl: ^6.0.3+2-LTS

  shimmer: ^3.0.0
  gal: ^2.3.2
  get_it: ^8.0.2
  permission_handler: ^12.0.1
  path_provider: ^2.1.5
  path: ^1.9.0
  intl: ^0.20.2
  shared_preferences: ^2.5.5
  cupertino_icons: ^1.0.9

  firebase_core: ^4.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Medium.ttf
          weight: 500
        - asset: assets/fonts/Roboto-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
